services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - vote-net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: votesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vote-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  vote:
    build: ./vote
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - vote-net

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PG_HOST=postgres
      - PG_DB=votesdb
      - PG_USER=postgres
      - PG_PASSWORD=postgres
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vote-net

  result:
    build: ./result
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - worker
    networks:
      - vote-net

networks:
  vote-net:
    driver: bridge

volumes:
  pgdata:
